<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>永久活码 · 微信群二维码</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix@0.0.1/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px 16px 40px;
            color: #1e2a3e;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #2b6e4f, #1e4a3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .live-qr-section {
            text-align: center;
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6c86a3;
            margin-bottom: 12px;
        }
        #liveQrCode {
            display: flex;
            justify-content: center;
            margin: 12px auto;
            padding: 8px;
            background: white;
            border-radius: 20px;
            width: fit-content;
        }
        .copy-link-btn {
            background: none;
            border: 1px solid #cbd5e1;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            color: #2c5a47;
            margin-top: 10px;
            cursor: pointer;
        }
        .target-qr-area { text-align: center; }
        .target-img-wrapper {
            background: #ffffff;
            border-radius: 28px;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid #eef2f8;
        }
        .target-qr-img {
            max-width: 100%;
            width: 260px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .placeholder-tip {
            background: #fef9e6;
            padding: 20px;
            border-radius: 24px;
            color: #b47c2e;
        }
        .update-time {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 12px;
        }
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #8ba0ae;
            margin-top: 20px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3ed9;
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
        button:active { transform: scale(0.97); }
        i { margin-right: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1><i class="fas fa-link"></i> 永久活码</h1>
            <p>扫码进入 → 自动展示最新群二维码</p>
        </div>

        <div class="live-qr-section">
            <div class="section-title"><i class="fas fa-qrcode"></i> 固定入口二维码（分享此码）</div>
            <div id="liveQrCode"></div>
            <button class="copy-link-btn" id="copyPageLinkBtn"><i class="far fa-copy"></i> 复制活码链接</button>
        </div>

        <div class="target-qr-area">
            <div class="section-title"><i class="fab fa-weixin"></i> 当前微信群二维码</div>
            <div class="target-img-wrapper">
                <img id="dynamicQrImg" class="target-qr-img" alt="微信群二维码" style="display: none;">
                <div id="noImagePlaceholder" class="placeholder-tip" style="display: none;">
                    <i class="fas fa-exclamation-triangle"></i> 正在加载配置...
                </div>
            </div>
            <div class="update-time" id="updateTimeText"></div>
        </div>
    </div>
    <div class="footer-note">
        ⚡ 本二维码永久有效，后台随时更新群码<br>
        📡 配置托管于 GitHub，所有用户实时同步
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // 从 GitHub 仓库的 config.json 读取配置
    // 请将下面的 URL 改为您的 GitHub raw 地址（部署后替换）
    const CONFIG_URL = 'https://raw.githubusercontent.com/kitmankl-rgb/live-qr-code/main/config.json';

    const dynamicQrImg = document.getElementById('dynamicQrImg');
    const noImagePlaceholder = document.getElementById('noImagePlaceholder');
    const updateTimeText = document.getElementById('updateTimeText');

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    // 加载远程配置
    async function loadConfig() {
        try {
            noImagePlaceholder.style.display = 'block';
            noImagePlaceholder.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 正在加载群二维码...';
            dynamicQrImg.style.display = 'none';

            const response = await fetch(CONFIG_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const config = await response.json();
            const imgUrl = config.targetImageUrl;
            const updated = config.lastUpdated || '未知';

            if (imgUrl && imgUrl.trim() !== '') {
                dynamicQrImg.src = imgUrl;
                dynamicQrImg.onload = () => {
                    dynamicQrImg.style.display = 'block';
                    noImagePlaceholder.style.display = 'none';
                };
                dynamicQrImg.onerror = () => {
                    noImagePlaceholder.style.display = 'block';
                    noImagePlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 图片加载失败，请检查图片地址是否正确';
                    dynamicQrImg.style.display = 'none';
                };
                updateTimeText.innerText = `🕒 最后更新: ${updated}`;
            } else {
                noImagePlaceholder.style.display = 'block';
                noImagePlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 暂无群二维码，请联系管理员配置';
                updateTimeText.innerText = '';
            }
        } catch (error) {
            console.error(error);
            noImagePlaceholder.style.display = 'block';
            noImagePlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 配置加载失败，请检查网络或联系管理员';
            dynamicQrImg.style.display = 'none';
        }
    }

    // 生成固定活码
    function generateLiveQR() {
        const liveQrDiv = document.getElementById('liveQrCode');
        if (!liveQrDiv) return;
        liveQrDiv.innerHTML = '';
        const pageUrl = window.location.href;
        try {
            new QRCode(liveQrDiv, {
                text: pageUrl,
                width: 160,
                height: 160,
                colorDark: '#1f5e46',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        } catch(e) {
            liveQrDiv.innerHTML = '<div style="font-size:12px;">二维码生成失败</div>';
        }
    }

    function copyPageLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            showToast('📋 活码链接已复制');
        }).catch(() => {
            showToast('请手动复制链接：' + url);
        });
    }

    document.getElementById('copyPageLinkBtn').addEventListener('click', copyPageLink);
    window.addEventListener('DOMContentLoaded', () => {
        generateLiveQR();
        loadConfig();
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>永久活码 · 微信群二维码</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px 16px 40px;
            color: #1e2a3e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #2b6e4f, #1e4a3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .header p {
            color: #5a6e7c;
            font-size: 0.85rem;
        }
        .target-img-wrapper {
            background: #ffffff;
            border-radius: 28px;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid #eef2f8;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }
        .target-qr-img {
            max-width: 100%;
            width: 260px;
            height: auto;
            border-radius: 20px;
            background: #fafcfd;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto;
        }
        .placeholder-tip {
            background: #fef9e6;
            padding: 20px;
            border-radius: 24px;
            color: #b47c2e;
            font-size: 0.9rem;
        }
        .update-time {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 16px;
        }
        .copy-link-btn {
            background: none;
            border: 1px solid #cbd5e1;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            color: #2c5a47;
            margin-top: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .copy-link-btn:hover {
            background: #eef2fa;
        }
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #8ba0ae;
            margin-top: 20px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3ed9;
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
        i {
            margin-right: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1><i class="fab fa-weixin"></i> 微信群二维码</h1>
            <p>长按识别或扫码加入群聊</p>
        </div>

        <!-- 微信群二维码展示区 -->
        <div class="target-img-wrapper">
            <img id="dynamicQrImg" class="target-qr-img" alt="微信群二维码" style="display: none;">
            <div id="noImagePlaceholder" class="placeholder-tip" style="display: none;">
                <i class="fas fa-spinner fa-pulse"></i> 正在加载...
            </div>
        </div>
        <div class="update-time" id="updateTimeText"></div>

        <!-- 可选：复制链接按钮，方便分享活码页面 -->
        <button class="copy-link-btn" id="copyPageLinkBtn"><i class="far fa-copy"></i> 复制永久活码链接</button>
    </div>
    <div class="footer-note">
        ⚡ 本二维码永久有效，后台随时更新<br>
        📡 配置托管于 GitHub，所有用户实时同步
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // 请替换为您的 GitHub raw 地址
    const CONFIG_URL = 'https://raw.githubusercontent.com/kitmankl-rgb/live-qr-code/main/config.json';

    const dynamicQrImg = document.getElementById('dynamicQrImg');
    const noImagePlaceholder = document.getElementById('noImagePlaceholder');
    const updateTimeText = document.getElementById('updateTimeText');

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    async function loadConfig() {
        try {
            noImagePlaceholder.style.display = 'block';
            noImagePlaceholder.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 正在加载群二维码...';
            dynamicQrImg.style.display = 'none';

            const response = await fetch(CONFIG_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const config = await response.json();
            const imgUrl = config.targetImageUrl;
            const updated = config.lastUpdated || '未知';

            if (imgUrl && imgUrl.trim() !== '') {
                dynamicQrImg.src = imgUrl;
                dynamicQrImg.onload = () => {
                    dynamicQrImg.style.display = 'block';
                    noImagePlaceholder.style.display = 'none';
                };
                dynamicQrImg.onerror = () => {
                    noImagePlaceholder.style.display = 'block';
                    noImagePlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 图片加载失败，请检查图片地址是否正确';
                    dynamicQrImg.style.display = 'none';
                };
                updateTimeText.innerText = `🕒 最后更新: ${updated}`;
            } else {
                noImagePlaceholder.style.display = 'block';
                noImagePlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 暂无群二维码，请联系管理员配置';
                updateTimeText.innerText = '';
            }
        } catch (error) {
            console.error(error);
            noImagePlaceholder.style.display = 'block';
            noImagePlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 配置加载失败，请检查网络或联系管理员';
            dynamicQrImg.style.display = 'none';
        }
    }

    function copyPageLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            showToast('📋 永久活码链接已复制');
        }).catch(() => {
            showToast('请手动复制链接：' + url);
        });
    }

    document.getElementById('copyPageLinkBtn').addEventListener('click', copyPageLink);
    window.addEventListener('DOMContentLoaded', loadConfig);
</script>
</body>
</html>
